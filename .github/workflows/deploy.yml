name: Deploy Vue to Cloudflare Pages

on:
  push:
    branches:
      - main  # Trigger on push to your production branch
  pull_request:
    branches:
      - main  # Optional: triggers a preview deployment for PRs

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-level: '24' # Match your local development environment
          cache: 'npm'     # Change to 'pnpm' or 'yarn' if applicable

      - name: Install Dependencies
        run: npm ci

      - name: Build Vue App
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy src --project-name="outscribed-web"
